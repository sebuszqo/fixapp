info:
  contact:
    email: support@fixapp.com
    name: API Support
  description: FixApp backend API server
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: FixApp API
  version: "1.0"
paths:
  /admin/jobs:
    get:
      consumes:
      - application/json
      description: Returns a paginated list of all jobs (admin only)
      parameters:
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Filter by category
        in: query
        name: category_id
        type: string
      - description: Filter by district
        in: query
        name: district_id
        type: string
      - description: Filter by client
        in: query
        name: client_id
        type: string
      - description: Limit (default 20, max 100)
        in: query
        name: limit
        type: integer
      - description: Offset (default 0)
        in: query
        name: offset
        type: integer
      produces:
